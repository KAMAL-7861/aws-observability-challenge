apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: elastic-agent
  namespace: online-boutique
  labels:
    app: elastic-agent
spec:
  selector:
    matchLabels:
      app: elastic-agent
  template:
    metadata:
      labels:
        app: elastic-agent
    spec:
      serviceAccountName: elastic-agent
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: elastic-agent
          image: docker.elastic.co/beats/elastic-agent:8.13.0
          env:
            - name: FLEET_URL
              valueFrom:
                configMapKeyRef:
                  name: elastic-agent-config
                  key: FLEET_URL
            - name: FLEET_ENROLLMENT_TOKEN
              valueFrom:
                configMapKeyRef:
                  name: elastic-agent-config
                  key: FLEET_ENROLLMENT_TOKEN
            - name: FLEET_ENROLL
              value: "1"
            - name: FLEET_INSECURE
              value: "false"
            - name: CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  name: elastic-agent-config
                  key: CLUSTER_NAME
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 500Mi
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: proc
              mountPath: /hostfs/proc
              readOnly: true
            - name: cgroup
              mountPath: /hostfs/sys/fs/cgroup
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: varlog
          hostPath:
            path: /var/log
